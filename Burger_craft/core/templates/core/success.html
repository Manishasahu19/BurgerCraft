<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Placed Successfully | BurgerCraft</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-amber-50/50 font-sans text-gray-800 flex items-center justify-center min-h-screen">

    <main class="max-w-md mx-auto px-4 w-full text-center py-12">
        <div class="bg-white rounded-3xl shadow-xl p-8 border border-amber-100 space-y-6">
            
            <div class="w-20 h-20 bg-emerald-50 rounded-full flex items-center justify-center mx-auto text-emerald-500 text-4xl shadow-inner animate-bounce">
                <i class="fa-solid fa-circle-check"></i>
            </div>

            <div class="space-y-2">
                <h1 class="text-3xl font-black text-gray-950 tracking-tight">Order Placed!</h1>
                <p class="text-amber-600 font-bold tracking-wide uppercase text-xs">Your craft is inside the kitchen</p>
            </div>

            <p class="text-gray-500 text-sm leading-relaxed">
                Thank you for ordering from <b class="text-amber-900">BurgerCraft</b>! Your dynamic mock payment went through flawlessly. Our chef has started working on that juicy patty.
            </p>

            <div class="bg-amber-50/70 p-4 rounded-2xl border border-amber-100 text-left space-y-1.5 font-medium text-xs text-gray-600">
                <div class="flex justify-between"><span class="text-gray-400">Order Status:</span><span class="text-emerald-600 font-bold">Preparing</span></div>
                <div class="flex justify-between"><span class="text-gray-400">Delivery Time:</span><span class="text-gray-900 font-bold">25-30 Mins</span></div>
            </div>

            <div class="pt-2">
                <a href="/" class="block w-full bg-amber-500 text-white font-black py-3.5 rounded-xl shadow hover:bg-amber-600 transition tracking-wide text-sm">
                    ORDER SOMETHING ELSE
                </a>
            </div>
        </div>
    </main>

</body>
</html>
